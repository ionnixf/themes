backend = "glx";
vsync = true;
use-damage = true;
detect-rounded-corners = false;
detect-client-opacity = true;
detect-transient = true;

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.28;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "class_g = 'i3-frame'",
    "name = 'Notification'",
    "class_g = 'Rofi'",
    "_GTK_FRAME_EXTENTS@"
];

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 4;

inactive-opacity = 0.94;
active-opacity = 1.0;
frame-opacity = 0.92;
inactive-opacity-override = false;

corner-radius = 0;

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = true;
blur-background-exclude = [
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@"
];

wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; };
    popup_menu = { opacity = 0.94; };
    dropdown_menu = { opacity = 0.94; };
};

; Standalone Polybar alternative for the neutral i3 setup.
; It is intentionally not started from ~/.config/i3/config.

[colors]
background = #d9181818
background-alt = #ed282828
foreground = #e8e8e8
normal = #c8c8c8
dim = #b0b0b0
muted = #777777
accent = #d8d8d8
urgent = #b85c5c
transparent = #00000000

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28px
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
border-size = 0
border-color = ${colors.transparent}

; Together these margins leave 12 px between adjacent status modules.
padding-left = 0px
padding-right = 8px
module-margin-left = 6px
module-margin-right = 6px


font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = DejaVu Sans:size=10;2

modules-left = i3
modules-center = xwindow
modules-right = tray cpu memory network pulseaudio battery xkeyboard date

enable-ipc = true
override-redirect = false
cursor-click = pointer
cursor-scroll = ns-resize

[module/i3]
type = internal/i3
index-sort = true
pin-workspaces = true
show-urgent = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
reverse-scroll = false

format = <label-state> <label-mode>

label-focused = %{O5px}%name%%{O6px}
label-focused-foreground = #181818
label-focused-background = ${colors.accent}

label-visible = %{O5px}%name%%{O6px}
label-visible-foreground = ${colors.foreground}
label-visible-background = ${colors.background-alt}

label-unfocused = %{O5px}%name%%{O6px}
label-unfocused-foreground = ${colors.muted}

label-urgent = %{O5px}%name%%{O6px}
label-urgent-foreground = #181818
label-urgent-background = ${colors.urgent}

label-mode = %mode%
label-mode-foreground = #181818
label-mode-background = ${colors.dim}
label-mode-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:…%
label-empty =
label-foreground = ${colors.muted}

[module/tray]
type = internal/tray
format-margin = 0px
tray-size = 16px
tray-padding = 0px
tray-spacing = 8px
tray-background = ${colors.background}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = 󰻠 %percentage%%
label-foreground = ${colors.dim}

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = 󰍛 %gb_used%
label-foreground = ${colors.dim}

[module/network]
type = internal/network
interface = ${env:POLYBAR_NETWORK_INTERFACE:lo}
interval = 2
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
label-connected = 󰈀 %ifname%
label-connected-foreground = ${colors.normal}

format-disconnected = <label-disconnected>
label-disconnected = 󰈀 offline
label-disconnected-foreground = ${colors.muted}

[module/pulseaudio]
type = internal/pulseaudio
interval = 2
use-ui-max = false

format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
label-volume-foreground = ${colors.dim}

format-muted = <label-muted>
label-muted = 󰝟 muted
label-muted-foreground = ${colors.muted}

click-left = ~/.config/i3/volume.sh mute
scroll-up = ~/.config/i3/volume.sh up
scroll-down = ~/.config/i3/volume.sh down

[module/battery]
type = custom/script
exec = ~/.config/polybar/battery.sh
interval = 10
format = <label>
label = %output%
label-foreground = ${colors.dim}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = caps lock

format = <label-layout>
label-layout = 󰌌 %icon%
label-layout-foreground = ${colors.normal}
layout-icon-0 = us;EN
layout-icon-1 = ru;RU

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
date-alt = %Y-%m-%d
time-alt = %H:%M:%S
label = 󰥔 %date%  %time%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
